<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Profile — College Event Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="navbar"></div>

<div class="form-wrap">
  <h2>My Profile</h2>
  <p class="form-sub">Update your account details.</p>

  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>

  <form id="profileForm">
    <label for="name">Full Name</label>
    <input type="text" id="name" required />

    <label for="email">Email (cannot be changed)</label>
    <input type="email" id="email" disabled />

    <label for="password">New Password <span style="font-weight:400; color:#5a6478;">(leave blank to keep current)</span></label>
    <input type="password" id="password" placeholder="At least 6 characters" />

    <button type="submit" class="btn btn-primary btn-block">Save Changes</button>
  </form>
</div>

<footer>
  <div class="container">College Event Management System &copy; 2026</div>
</footer>

<script type="module">
  import { renderNavbar, requireAuth, showError, hideError } from "./js/app.js";
  import { mountChatbot } from "./js/chatbot.js";
  import { updateProfile } from "./js/auth.js";

  const user = await requireAuth();
  if (user) {
    await renderNavbar("profile");
  mountChatbot();
    document.getElementById("name").value = user.name;
    document.getElementById("email").value = user.email;
  }

  const form = document.getElementById("profileForm");
  const errorMsg = document.getElementById("errorMsg");
  const successMsg = document.getElementById("successMsg");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    hideError(errorMsg);
    successMsg.classList.remove("show");

    const name = document.getElementById("name").value;
    const password = document.getElementById("password").value;

    const result = await updateProfile(name, password);
    if (!result.ok) {
      showError(errorMsg, result.message);
      return;
    }
    successMsg.textContent = "Profile updated successfully.";
    successMsg.classList.add("show");
    document.getElementById("password").value = "";
    await renderNavbar("profile");
  });
</script>
</body>
</html>
